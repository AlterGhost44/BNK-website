<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dziękujemy za wiadomość. Odezwiemy się w ciągu 24 godzin.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#0d1117">
  <link rel="canonical" href="https://bnkstudiox.com/thanks.html">
  <meta property="og:image" content="/assets/image/og-image.png">
  <title>Dziękujemy | BNK Studio X – Strony internetowe dla firm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="icon" type="image/svg+xml" href="/assets/image/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/image/favicon.png">
  <script src="js/script.js" defer></script>
  <script src="js/cookie-consent.js"></script>
</head>
<body>
  <script>(function(){try{var c=localStorage.getItem('cookie_consent');if(c==='accepted'||c==='rejected')document.documentElement.dataset.cookieConsent=c;}catch(e){}})();</script>

  <main id="main-content" class="thanks-page">
    <section class="thanks-section" id="thanks" aria-labelledby="thanks-heading">
      <div class="thanks-section__box">
        <h1 id="thanks-heading" class="thanks-section__title">Dziękujemy za kontakt</h1>
        <p class="thanks-section__text">Odezwiemy się do Ciebie w ciągu <strong>24 godzin</strong> w dni robocze.</p>
        <a href="index.html" class="btn btn--primary btn--large">Powrót na stronę główną</a>
      </div>
    </section>
  </main>

  <div id="cookie-consent" class="cookie-consent" aria-live="polite" role="dialog" aria-label="Zgoda na cookies">
    <div class="cookie-consent__inner">
      <p class="cookie-consent__text">Ta strona używa plików cookies w celach analitycznych (Google Analytics). Wybierz, czy wyrażasz zgodę na ich użycie.</p>
      <div class="cookie-consent__actions">
        <button type="button" class="btn btn--primary cookie-consent__btn" data-consent="accept">Wyrażam zgodę</button>
        <button type="button" class="btn btn--outline cookie-consent__btn" data-consent="reject">Nie wyrażam zgody</button>
      </div>
    </div>
  </div>
</body>
</html>
